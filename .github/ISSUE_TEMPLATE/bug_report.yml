name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: input
    id: app
    attributes:
      label: App
      description: Which app is affected?
      placeholder: e.g. admin, landing, kasir-retail, kasir-fnb
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS: [e.g. Windows 11, macOS 14]
        - Browser: [e.g. Chrome 125]
        - Node version: [e.g. 20.15]
      placeholder: |
        OS:
        Browser:
        Node:
    validations:
      required: false
